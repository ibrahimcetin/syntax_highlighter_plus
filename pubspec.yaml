name: syntax_highlighter_plus
description: "A robust syntax highlighting Flutter package powered by TextMate grammars."
repository: https://github.com/ibrahimcetin/syntax_highlighter_plus
version: 0.0.2

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  collection: ^1.19.1
  string_scanner: ^1.4.1
  rust_lib_syntax_highlighter_plus:
    path: rust_builder
  flutter_rust_bridge: 2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  import_sorter: ^4.6.0
  integration_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  assets:
    - assets/grammars/
    - assets/themes/

import_sorter:
  comments: false