name: syntax_highlighter_plus
description: "A robust syntax highlighting Flutter package powered by TextMate grammars."
repository: https://github.com/ibrahimcetin/syntax_highlighter_plus
version: 0.0.2

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

  collection: ^1.19.1
  string_scanner: ^1.4.1
  ffi: ^2.2.0

dev_dependencies:
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  import_sorter: ^4.6.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true

  assets:
    - assets/grammars/
    - assets/themes/
 

import_sorter:
  comments: false