name: syntax_highlighter_plus
description: "A robust syntax highlighting Flutter package powered by TextMate grammars."
repository: https://github.com/ibrahimcetin/syntax_highlighter_plus
version: 0.1.0

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  import_sorter: ^4.6.0
  integration_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
  # Grammars (assets/grammars/) are embedded in the Rust library at build
  # time, so they are intentionally NOT bundled as Flutter assets.
  assets:
    - assets/themes/

import_sorter:
  comments: false